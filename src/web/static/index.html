<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商导购与知识问答</title>
    <script src="/static/marked.min.js"></script>
    <script src="/static/purify.min.js"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-soft: #dbeafe;
            --background-color: #f4f6fb;
            --surface-color: #ffffff;
            --border-color: #dbe2f0;
            --text-color: #0f172a;
            --muted-color: #64748b;
            --shadow-color: rgba(15, 23, 42, 0.08);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, #dbeafe 0, transparent 28%),
                linear-gradient(180deg, #f8fbff 0%, var(--background-color) 100%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        .page {
            width: 100%;
            max-width: 960px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .hero {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 18px 40px var(--shadow-color);
            border-radius: 28px;
            padding: 24px;
        }

        .hero h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .hero p {
            color: var(--muted-color);
            line-height: 1.6;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            background: var(--surface-color);
            border-radius: var(--radius);
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 12px 30px var(--shadow-color);
        }

        .mode-switch {
            display: inline-flex;
            gap: 8px;
            padding: 6px;
            border-radius: 999px;
            background: #eef2ff;
        }

        .mode-button {
            border: none;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
            color: var(--muted-color);
            background: transparent;
            transition: all 0.2s ease;
        }

        .mode-button.active {
            background: var(--surface-color);
            color: var(--primary-color);
            box-shadow: 0 6px 12px rgba(37, 99, 235, 0.12);
        }

        .toolbar-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chip {
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--primary-soft);
            color: var(--primary-color);
            font-size: 13px;
        }

        .secondary-button {
            border: 1px solid var(--border-color);
            background: var(--surface-color);
            color: var(--text-color);
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
        }

        #dialog-area {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-bubble {
            max-width: min(780px, 100%);
            padding: 14px 16px;
            border-radius: 18px;
            line-height: 1.6;
            box-shadow: 0 10px 24px var(--shadow-color);
            animation: slide-in 0.2s ease;
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #ffffff;
        }

        .bot-message {
            align-self: flex-start;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
        }

        .recommendation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            width: 100%;
        }

        .recommendation-card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 14px;
            box-shadow: 0 12px 24px var(--shadow-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .recommendation-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 14px;
            background: #e2e8f0;
        }

        .recommendation-card h3 {
            font-size: 16px;
        }

        .recommendation-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            color: var(--muted-color);
            font-size: 13px;
        }

        .recommendation-price {
            color: #dc2626;
            font-weight: 700;
            font-size: 18px;
        }

        .recommendation-card p {
            color: #334155;
            font-size: 14px;
            line-height: 1.6;
        }

        .input-box {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 18px 40px var(--shadow-color);
            padding: 16px;
            position: sticky;
            bottom: 16px;
        }

        #user-input {
            width: 100%;
            min-height: 92px;
            max-height: 220px;
            resize: none;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-color);
        }

        .input-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 12px;
        }

        .hint {
            color: var(--muted-color);
            font-size: 13px;
        }

        #send-btn {
            border: none;
            border-radius: 12px;
            padding: 10px 18px;
            background: var(--primary-color);
            color: #ffffff;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 22px rgba(37, 99, 235, 0.24);
        }

        #send-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .loading {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .loader {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 3px solid #cbd5e1;
            border-top-color: var(--primary-color);
            animation: spin 1s linear infinite;
        }

        .markdown-content p,
        .markdown-content ul,
        .markdown-content ol,
        .markdown-content pre {
            margin: 0.6em 0;
        }

        .markdown-content code {
            background: #eff6ff;
            padding: 0.15em 0.4em;
            border-radius: 6px;
        }

        .markdown-content pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 12px;
            border-radius: 14px;
            overflow-x: auto;
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .toolbar,
            .input-footer {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar-actions {
                justify-content: space-between;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <section class="hero">
            <h1>知识图谱导购与问答</h1>
            <p>导购模式支持多轮手机推荐：预算、品牌、机身存储和用途会逐轮累计；问答模式为知识图谱单轮问答链路。</p>
        </section>

        <section class="toolbar">
            <div class="mode-switch">
                <button id="dialogue-mode-btn" class="mode-button active" data-mode="dialogue">导购对话</button>
                <button id="qa-mode-btn" class="mode-button" data-mode="qa">知识问答</button>
            </div>
            <div class="toolbar-actions">
                <div id="mode-tip" class="chip">当前模式：手机导购</div>
                <button id="reset-btn" class="secondary-button">重新开始</button>
            </div>
        </section>

        <section id="dialog-area">
            <div class="message-block">
                <div class="message-bubble bot-message">
                    你好，我现在可以做两件事：
                    <br>1. 多轮手机导购，例如“想买手机，预算 4000 左右”
                    <br>2. 单轮知识问答，例如“Apple 都有哪些产品”
                </div>
            </div>
        </section>

        <section class="input-box">
            <textarea id="user-input" placeholder="输入你的问题或导购需求，例如：想买手机，预算 5000 以内，更看重拍照"></textarea>
            <div class="input-footer">
                <div class="hint" id="mode-hint">导购模式会自动记住本轮会话条件。</div>
                <button id="send-btn">发送</button>
            </div>
        </section>
    </div>

    <script>
        const dialogArea = document.getElementById('dialog-area');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const resetBtn = document.getElementById('reset-btn');
        const modeButtons = document.querySelectorAll('.mode-button');
        const modeTip = document.getElementById('mode-tip');
        const modeHint = document.getElementById('mode-hint');

        let currentMode = 'dialogue';
        let dialogueSessionId = null;

        marked.setOptions({ breaks: false });

        function setMode(mode) {
            currentMode = mode;
            modeButtons.forEach((button) => {
                button.classList.toggle('active', button.dataset.mode === mode);
            });

            if (mode === 'dialogue') {
                modeTip.textContent = '当前模式：手机导购';
                modeHint.textContent = '导购模式会自动记住本轮会话条件。';
                input.placeholder = '例如：想买手机，预算 5000 以内，更看重拍照';
                resetBtn.disabled = false;
            } else {
                modeTip.textContent = '当前模式：知识问答';
                modeHint.textContent = '问答模式保持单轮，不保存会话状态。';
                input.placeholder = '例如：Apple 都有哪些产品';
                resetBtn.disabled = true;
            }
        }

        modeButtons.forEach((button) => {
            button.addEventListener('click', () => setMode(button.dataset.mode));
        });

        resetBtn.addEventListener('click', () => {
            dialogueSessionId = null;
            addBotMessage('已清空当前导购会话。你可以重新告诉我预算、品牌或用途。');
        });

        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = `${Math.min(input.scrollHeight, 220)}px`;
        });

        input.addEventListener('keypress', (event) => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) {
                return;
            }

            addUserMessage(message);
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;

            const loadingNode = createLoadingNode();
            dialogArea.appendChild(loadingNode);
            window.scrollTo(0, document.body.scrollHeight);

            try {
                if (currentMode === 'dialogue') {
                    await sendDialogueTurn(message);
                } else {
                    await sendQaTurn(message);
                }
            } catch (error) {
                addBotMessage(error.message || '系统暂时无法响应，请稍后再试。');
            } finally {
                loadingNode.remove();
                sendBtn.disabled = false;
            }
        }

        async function sendDialogueTurn(message) {
            const response = await fetch('/api/dialogue/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message,
                    session_id: dialogueSessionId,
                }),
            });

            const payload = await parseResponse(response);
            dialogueSessionId = payload.session_id;
            addBotMessage(payload.message);

            if (Array.isArray(payload.recommendations) && payload.recommendations.length > 0) {
                addRecommendationCards(payload.recommendations);
            }
        }

        async function sendQaTurn(message) {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message }),
            });

            const payload = await parseResponse(response);
            addBotMessage(payload.message);
        }

        async function parseResponse(response) {
            const payload = await response.json().catch(() => ({}));
            if (!response.ok) {
                const detail = payload.detail || payload.message || '请求失败';
                throw new Error(detail);
            }
            return payload;
        }

        function createLoadingNode() {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-block';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble bot-message';
            bubble.innerHTML = '<div class="loading"><div class="loader"></div><span>正在处理中...</span></div>';

            wrapper.appendChild(bubble);
            return wrapper;
        }

        function addUserMessage(content) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-block';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble user-message';
            bubble.textContent = content;

            wrapper.appendChild(bubble);
            dialogArea.appendChild(wrapper);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function addBotMessage(content) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-block';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble bot-message';

            const container = document.createElement('div');
            container.className = 'markdown-content';
            const dirty = marked.parse(String(content));
            container.innerHTML = DOMPurify.sanitize(dirty);
            bubble.appendChild(container);

            wrapper.appendChild(bubble);
            dialogArea.appendChild(wrapper);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function addRecommendationCards(recommendations) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-block';

            const grid = document.createElement('div');
            grid.className = 'recommendation-grid';

            recommendations.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'recommendation-card';

                const image = document.createElement('img');
                image.src = item.default_img || '';
                image.alt = item.spu_name;
                image.loading = 'lazy';
                image.onerror = () => {
                    image.style.display = 'none';
                };

                const title = document.createElement('h3');
                title.textContent = `${index + 1}. ${item.spu_name}`;

                const meta = document.createElement('div');
                meta.className = 'recommendation-meta';
                meta.innerHTML = `
                    <span>品牌：${item.brand}</span>
                    <span>SKU：${item.sku_id}</span>
                `;

                const price = document.createElement('div');
                price.className = 'recommendation-price';
                price.textContent = `¥${Math.round(item.price)}`;

                const storage = document.createElement('div');
                storage.className = 'recommendation-meta';
                storage.textContent = item.storage_options?.length
                    ? `可选存储：${item.storage_options.join(' / ')}`
                    : '可选存储：未标注';

                const reason = document.createElement('p');
                reason.textContent = item.reason;

                card.appendChild(image);
                card.appendChild(title);
                card.appendChild(meta);
                card.appendChild(price);
                card.appendChild(storage);
                card.appendChild(reason);
                grid.appendChild(card);
            });

            wrapper.appendChild(grid);
            dialogArea.appendChild(wrapper);
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>

</html>
